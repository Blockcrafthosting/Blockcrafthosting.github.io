
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Crear cuenta</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="js/auth.js" defer></script>
</head>
<body>
  <h2>Crear cuenta</h2>
  <form id="signup-form">

    <button type="submit">Registrarse</button>
  </form>
</body>
</html>
