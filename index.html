<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planes de Hosting - BlockCraftHosting</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>BlockCraftHosting</h1>
    <p>Planes adaptados a tus necesidades</p>
  </header>
  
  <main>
    <h2>Elige tu plan de Hosting</h2>
    <div class="planes">
      <section class="plan">
        <h3>Gratis</h3>
        <p class="precio">$0 / mes</p>
        <p class="detalle">1GB RAM - 24h Uptime</p>
        <p class="detalle">Panel de control básico</p>
        <button onclick="window.location.href='registro.html'">Seleccionar</button>
      </section>
      <section class="plan">
        <h3>Premium</h3>
        <p class="precio">$5 / mes</p>
        <p class="detalle">4GB RAM - Soporte 24/7</p>
        <p class="detalle">Panel avanzado y backups</p>
        <button onclick="window.location.href='pago.html'">Seleccionar</button>
      </section>
    </div>
  </main>
</body>
</html>
